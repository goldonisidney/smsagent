name: Build SMS Agent DEB

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Create DEB structure
        run: |
          mkdir -p deb_package/DEBIAN
          mkdir -p deb_package/Library/MobileSubstrate/DynamicLibraries

          # Control file
          cat > deb_package/DEBIAN/control << 'EOF'
Package: com.smsagent.tweak
Name: SMS Agent
Version: 1.0.0
Architecture: iphoneos-arm64
Description: Tweak para enviar SMS em massa com interface gráfica
Maintainer: SMS Agent
Author: SMS Agent
Section: Tweaks
Depends: mobilesubstrate
EOF

          # Postinst script
          cat > deb_package/DEBIAN/postinst << 'EOF'
#!/bin/bash
echo 'SMS Agent instalado!'
exit 0
EOF

          chmod 755 deb_package/DEBIAN/postinst
          chmod 644 deb_package/DEBIAN/control

      - name: Build DEB
        run: |
          dpkg-deb --build --root-owner-group deb_package com.smsagent.tweak_1.0.0_iphoneos-arm64.deb
          ls -lh com.smsagent.tweak_1.0.0_iphoneos-arm64.deb

      - name: Upload DEB
        uses: actions/upload-artifact@v3
        with:
          name: SMS-Agent-DEB
          path: com.smsagent.tweak_1.0.0_iphoneos-arm64.deb
