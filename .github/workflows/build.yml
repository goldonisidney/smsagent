name: Build iOS Tweaks

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git curl wget build-essential \
          clang llvm lld \
          libssl-dev zlib1g-dev \
          dpkg-dev fakeroot

    - name: Install ldid
      run: |
        curl -L https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5/ldid_linux_x86_64 \
          -o /usr/local/bin/ldid
        chmod +x /usr/local/bin/ldid
        ldid || true

    - name: Setup THEOS
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Download iOS 15 SDK
      run: |
        mkdir -p $HOME/theos/sdks
        cd $HOME/theos/sdks
        echo "Downloading SDK..."
        wget -q --show-progress \
          "https://github.com/theos/sdks/releases/download/iPhoneOS15.8.3-SDK/iPhoneOS15.8.3.sdk.tar.lz" \
          -O sdk.tar.lz 2>&1 || \
        wget -q --show-progress \
          "https://github.com/alexkalmuk/ios-sdks/releases/download/15.2/iPhoneOS15.2.sdk.tar.xz" \
          -O sdk.tar.xz 2>&1 || true

        if [ -f sdk.tar.lz ]; then
          sudo apt-get install -y lzip
          tar --lzip -xf sdk.tar.lz && rm sdk.tar.lz
        elif [ -f sdk.tar.xz ]; then
          tar -xf sdk.tar.xz && rm sdk.tar.xz
        fi

        echo "SDKs disponíveis:"
        ls

    - name: Build Font Changer
      continue-on-error: true
      run: |
        export THEOS=$HOME/theos
        cd $GITHUB_WORKSPACE/FontChanger
        make clean
        make package 2>&1
        find . -name "*.deb" -exec ls -lh {} \;

    - name: Build JB Bypass
      continue-on-error: true
      run: |
        export THEOS=$HOME/theos
        cd $GITHUB_WORKSPACE/JBBypass
        make clean
        make package 2>&1
        find . -name "*.deb" -exec ls -lh {} \;

    - name: Upload FontChanger
      uses: actions/upload-artifact@v4
      with:
        name: FontChanger-deb
        path: FontChanger/packages/*.deb
        if-no-files-found: warn
        retention-days: 30

    - name: Upload JBBypass
      uses: actions/upload-artifact@v4
      with:
        name: JBBypass-deb
        path: JBBypass/packages/*.deb
        if-no-files-found: warn
        retention-days: 30
