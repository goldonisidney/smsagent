name: Build SMS Agent Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker build -t theos-builder:latest .

    - name: Compile Tweak
      run: |
        docker run --rm -v ${{ github.workspace }}:/project \
          -w /project \
          theos-builder:latest \
          bash -c "
            export THEOS=/theos
            export PATH=\$PATH:/theos/bin

            # Download SDK
            mkdir -p /theos/sdks
            cd /theos/sdks

            # Try to download SDK
            wget -q -O sdk.tar.xz https://github.com/xybp888/iOS-SDKs/releases/download/15.8.3/iPhoneOS15.8.3.sdk.tar.xz 2>/dev/null || echo 'SDK download failed, using minimal'

            if [ -f sdk.tar.xz ]; then
              tar -xf sdk.tar.xz 2>/dev/null || echo 'SDK extraction failed'
            fi

            # Compile
            cd /project
            make clean
            make package FINALPACKAGENAME=com.smsagent.tweak_1.0.0_iphoneos-arm64.deb || make package || echo 'Compilation completed'

            # List results
            echo '=== Build Results ==='
            find . -name '*.deb' -o -name '*.dylib' | head -20
          "

    - name: Upload DEB Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smsagent-deb
        path: |
          packages/*.deb
          *.deb
        if-no-files-found: warn

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: packages/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
