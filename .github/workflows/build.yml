name: Build Font Changer Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      uses: Randomblock1/theos-action@v1

    - name: Build Font Changer
      run: |
        cd FontChanger
        make package FINALPACKAGE=1
        echo "=== DEB gerado ==="
        find . -name "*.deb" -exec ls -lh {} \;

    - name: Upload FontChanger DEB
      uses: actions/upload-artifact@v4
      with:
        name: FontChanger-deb
        path: FontChanger/packages/*.deb
        if-no-files-found: error
        retention-days: 30
