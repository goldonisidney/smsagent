name: Build JBBypass Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kabiroberai/theos-builder:latest

    steps:
    - uses: actions/checkout@v4

    - name: Build JBBypass
      run: |
        cd $GITHUB_WORKSPACE/JBBypass
        make clean
        make package
        echo "=== Packages gerados ==="
        find . -name "*.deb" -exec ls -lh {} \;

    - name: Upload JBBypass
      uses: actions/upload-artifact@v4
      with:
        name: JBBypass-deb
        path: JBBypass/packages/*.deb
        retention-days: 30
