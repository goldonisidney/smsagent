name: Build iOS Tweaks

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
    - uses: actions/checkout@v4

    - name: Install ldid
      run: |
        curl -L https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5/ldid_macosx_x86_64 \
          -o /usr/local/bin/ldid
        chmod +x /usr/local/bin/ldid

    - name: Setup THEOS
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Download iOS SDK
      run: |
        mkdir -p $HOME/theos/sdks
        cd $HOME/theos/sdks
        curl -L https://github.com/theos/sdks/releases/download/iPhoneOS15.8.3-SDK/iPhoneOS15.8.3.sdk.tar.lz \
          -o sdk.tar.lz
        tar --lzip -xf sdk.tar.lz
        rm sdk.tar.lz
        ls

    - name: Build Font Changer
      run: |
        export THEOS=$HOME/theos
        cd $GITHUB_WORKSPACE/FontChanger
        make clean
        make package
        echo "=== FontChanger packages ==="
        find . -name "*.deb"

    - name: Build JB Bypass
      run: |
        export THEOS=$HOME/theos
        cd $GITHUB_WORKSPACE/JBBypass
        make clean
        make package
        echo "=== JBBypass packages ==="
        find . -name "*.deb"

    - name: Upload Font Changer
      uses: actions/upload-artifact@v4
      with:
        name: FontChanger-deb
        path: FontChanger/packages/*.deb
        retention-days: 30

    - name: Upload JB Bypass
      uses: actions/upload-artifact@v4
      with:
        name: JBBypass-deb
        path: JBBypass/packages/*.deb
        retention-days: 30
