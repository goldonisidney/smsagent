name: Build iOS Tweaks

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git curl wget build-essential \
          clang llvm lld \
          libssl-dev zlib1g-dev \
          dpkg-dev fakeroot xz-utils

    - name: Install ldid
      run: |
        curl -L https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5/ldid_linux_x86_64 \
          -o /usr/local/bin/ldid
        chmod +x /usr/local/bin/ldid

    - name: Setup THEOS
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Download iOS SDK
      run: |
        mkdir -p $HOME/theos/sdks
        cd $HOME/theos/sdks

        echo "Tentando baixar SDK..."
        wget -q "https://github.com/kamyarelyasi/iPhoneOS-SDKs/releases/download/15.0/iPhoneOS15.0.sdk.tar.xz" \
          -O sdk.tar.xz 2>&1 && \
        tar -xf sdk.tar.xz && \
        rm sdk.tar.xz && \
        echo "✅ SDK baixado com sucesso!" || \
        echo "⚠️ SDK download falhou"

        echo "SDKs disponíveis:"
        ls -la

    - name: Build Font Changer
      continue-on-error: true
      run: |
        export THEOS=$HOME/theos
        cd $GITHUB_WORKSPACE/FontChanger
        make clean
        make package 2>&1
        find . -name "*.deb" -exec ls -lh {} \; || true

    - name: Build JB Bypass
      continue-on-error: true
      run: |
        export THEOS=$HOME/theos
        cd $GITHUB_WORKSPACE/JBBypass
        make clean
        make package 2>&1
        find . -name "*.deb" -exec ls -lh {} \; || true

    - name: Upload FontChanger
      uses: actions/upload-artifact@v4
      with:
        name: FontChanger-deb
        path: FontChanger/packages/*.deb
        if-no-files-found: warn
        retention-days: 30

    - name: Upload JBBypass
      uses: actions/upload-artifact@v4
      with:
        name: JBBypass-deb
        path: JBBypass/packages/*.deb
        if-no-files-found: warn
        retention-days: 30
