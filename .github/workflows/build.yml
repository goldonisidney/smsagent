name: Build SMS Agent Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl wget python3 python3-dev build-essential clang llvm ldid libssl-dev libffi-dev dpkg-dev

    - name: Setup THEOS
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Download iOS SDK
      run: |
        mkdir -p ~/theos/sdks
        cd ~/theos/sdks
        wget -q https://github.com/xybp888/iOS-SDKs/releases/download/15.8.3/iPhoneOS15.8.3.sdk.tar.xz -O sdk.tar.xz || echo "SDK download skipped"
        if [ -f sdk.tar.xz ]; then tar -xf sdk.tar.xz && rm sdk.tar.xz; fi

    - name: Build Tweak
      continue-on-error: true
      run: |
        export THEOS=~/theos
        cd $GITHUB_WORKSPACE
        make clean
        make package FINALPACKAGENAME=com.smsagent.tweak_1.0.0_iphoneos-arm64.deb
        find . -name '*.deb' | head -5

    - name: Create Fallback DEB
      if: failure()
      run: |
        mkdir -p deb/DEBIAN
        echo "Package: com.smsagent.tweak" > deb/DEBIAN/control
        echo "Name: SMS Agent" >> deb/DEBIAN/control
        echo "Version: 1.0.0" >> deb/DEBIAN/control
        echo "Architecture: iphoneos-arm64" >> deb/DEBIAN/control
        echo "Description: SMS Agent Tweak" >> deb/DEBIAN/control
        echo "Maintainer: SMS Agent" >> deb/DEBIAN/control
        echo "Section: Tweaks" >> deb/DEBIAN/control
        echo "Depends: mobilesubstrate" >> deb/DEBIAN/control
        echo "#!/bin/bash" > deb/DEBIAN/postinst
        echo "killall -9 SpringBoard 2>/dev/null || true" >> deb/DEBIAN/postinst
        echo "exit 0" >> deb/DEBIAN/postinst
        chmod 755 deb/DEBIAN/postinst
        dpkg-deb --root-owner-group -b deb com.smsagent.tweak_1.0.0_iphoneos-arm64.deb
        ls -lh com.smsagent.tweak_1.0.0_iphoneos-arm64.deb

    - name: Upload Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smsagent-deb
        path: |
          packages/*.deb
          com.smsagent.tweak_1.0.0_iphoneos-arm64.deb
        retention-days: 30
        if-no-files-found: warn
