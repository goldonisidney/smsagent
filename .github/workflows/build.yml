name: Build Font Changer Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup THEOS
      run: |
        brew install ldid
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/bin" >> $GITHUB_PATH

    - name: Download iOS SDK
      run: |
        mkdir -p $HOME/theos/sdks
        curl -L https://github.com/theos/sdks/releases/download/iPhoneOS15.8.3-SDK/iPhoneOS15.8.3.sdk.tar.lz \
          -o $HOME/theos/sdks/sdk.tar.lz
        cd $HOME/theos/sdks
        tar --lzip -xf sdk.tar.lz
        rm sdk.tar.lz
        ls $HOME/theos/sdks

    - name: Build Tweak
      run: |
        export THEOS=$HOME/theos
        cd $GITHUB_WORKSPACE/FontChanger
        make clean
        make package

    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: fontchanger-deb
        path: FontChanger/packages/*.deb
        retention-days: 30
