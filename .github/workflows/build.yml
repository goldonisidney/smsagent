name: Build SMS Agent Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dpkg-dev
      run: sudo apt-get update && sudo apt-get install -y dpkg-dev

    - name: Create DEB Package
      run: |
        mkdir -p deb_package/DEBIAN

        cat > deb_package/DEBIAN/control << 'CONTROL'
Package: com.smsagent.tweak
Name: SMS Agent
Version: 1.0.0
Architecture: iphoneos-arm64
Description: Tweak para enviar SMS em massa com interface gráfica
Maintainer: SMS Agent
Author: SMS Agent
Section: Tweaks
Depends: mobilesubstrate
CONTROL

        cat > deb_package/DEBIAN/postinst << 'POSTINST'
#!/bin/bash
killall -9 SpringBoard 2>/dev/null || true
exit 0
POSTINST

        chmod 755 deb_package/DEBIAN/postinst
        chmod 644 deb_package/DEBIAN/control

        dpkg-deb --root-owner-group -b deb_package com.smsagent.tweak_1.0.0_iphoneos-arm64.deb

        echo "=== DEB Created ==="
        ls -lh com.smsagent.tweak_1.0.0_iphoneos-arm64.deb

    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: smsagent-deb
        path: com.smsagent.tweak_1.0.0_iphoneos-arm64.deb
        retention-days: 30
